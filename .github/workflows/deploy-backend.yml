name: Deploy Backend to Production

on:
  workflow_run:
    workflows: ["CI"]
    branches: [master]
    types: [completed]

permissions:
  actions: read
  contents: read

concurrency:
  group: production-backend
  cancel-in-progress: false

jobs:
  deploy-backend:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the CI-verified commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Download CI-tested backend artifact
        uses: actions/download-artifact@v4
        with:
          name: quizmaker-backend-jar
          path: deployment-artifact
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Prepare deployment bundle
        run: |
          rm -rf deployment
          mkdir -p deployment
          cp -r server/backend/. deployment/
          cp deployment-artifact/QuizMaker-*.jar deployment/

      - name: Copy deployment bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: deployment/*
          target: /var/www/quizmaker-backend/
          strip_components: 1
          overwrite: true

      - name: Roll out CI-verified backend
        uses: appleboy/ssh-action@v1.0.3
        env:
          RELEASE_SHA: ${{ github.event.workflow_run.head_sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          envs: RELEASE_SHA
          script: |
            set -Eeuo pipefail
            cd /var/www/quizmaker-backend

            cat > .env <<'EOF'
            BACKEND_IMAGE="quizmaker-backend:__RELEASE_SHA__"
            DB_USERNAME="${{ secrets.DB_PROD_USERNAME || 'quizmaker_user' }}"
            DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            DB_ROOT_PASSWORD="${{ secrets.DB_ROOT_PASSWORD }}"
            MYSQL_ROOT_PASSWORD="${{ secrets.DB_ROOT_PASSWORD }}"
            MYSQL_INIT_SHOW_SECRETS="0"
            JWT_SECRET="${{ secrets.JWT_SECRET }}"
            TOKEN_PEPPER_SECRET="${{ secrets.TOKEN_PEPPER_SECRET }}"
            RESET_TOKEN_PEPPER="${{ secrets.RESET_TOKEN_PEPPER }}"
            VERIFICATION_TOKEN_PEPPER="${{ secrets.VERIFICATION_TOKEN_PEPPER }}"
            OPENAI_API_KEY="${{ secrets.OPENAI_API_KEY }}"
            OPENAI_MODEL="${{ secrets.OPENAI_MODEL }}"
            OAUTH2_REDIRECT_URI="${{ secrets.OAUTH2_REDIRECT_URI }}"
            OAUTH2_TOKEN_SECRET="${{ secrets.OAUTH2_TOKEN_SECRET }}"
            GOOGLE_CLIENT_ID="${{ secrets.GOOGLE_CLIENT_ID }}"
            GOOGLE_CLIENT_SECRET="${{ secrets.GOOGLE_CLIENT_SECRET }}"
            OAUTH_GITHUB_CLIENT_ID="${{ secrets.OAUTH_GITHUB_CLIENT_ID }}"
            OAUTH_GITHUB_CLIENT_SECRET="${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}"
            STRIPE_SECRET_KEY="${{ secrets.STRIPE_SECRET_KEY }}"
            STRIPE_WEBHOOK_SECRET="${{ secrets.STRIPE_WEBHOOK_SECRET }}"
            STRIPE_PUBLISHABLE_KEY="${{ secrets.STRIPE_PUBLISHABLE_KEY }}"
            STRIPE_PRICE_SMALL="${{ secrets.STRIPE_PRICE_SMALL }}"
            STRIPE_PRICE_MEDIUM="${{ secrets.STRIPE_PRICE_MEDIUM }}"
            STRIPE_PRICE_LARGE="${{ secrets.STRIPE_PRICE_LARGE }}"
            STRIPE_PRICE_SUBSCRIPTION="${{ secrets.STRIPE_PRICE_SUBSCRIPTION }}"
            STRIPE_SUCCESS_URL="${{ secrets.STRIPE_SUCCESS_URL }}"
            STRIPE_CANCEL_URL="${{ secrets.STRIPE_CANCEL_URL }}"
            SMTP_HOST="${{ secrets.SMTP_HOST }}"
            SMTP_PORT="${{ secrets.SMTP_PORT }}"
            SMTP_USERNAME="${{ secrets.SMTP_USERNAME }}"
            SMTP_PASSWORD="${{ secrets.SMTP_PASSWORD }}"
            APP_EMAIL_PROVIDER="${{ secrets.APP_EMAIL_PROVIDER }}"
            APP_EMAIL_FROM="${{ secrets.APP_EMAIL_FROM }}"
            APP_EMAIL_REGION="${{ secrets.APP_EMAIL_REGION }}"
            APP_EMAIL_SES_CONFIGURATION_SET="${{ secrets.APP_EMAIL_SES_CONFIGURATION_SET || '' }}"
            AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}"
            AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}"
            AWS_REGION="${{ secrets.AWS_REGION }}"
            MEDIA_BUCKET="${{ secrets.MEDIA_BUCKET || 'quizzence' }}"
            MEDIA_REGION="${{ secrets.MEDIA_REGION || 'lon1' }}"
            MEDIA_ENDPOINT="${{ secrets.MEDIA_ENDPOINT || 'https://lon1.digitaloceanspaces.com' }}"
            MEDIA_CDN_BASE_URL="${{ secrets.MEDIA_CDN_BASE_URL || 'https://cdn.quizzence.com' }}"
            DO_SPACES_ACCESS_KEY="${{ secrets.DO_SPACES_ACCESS_KEY }}"
            DO_SPACES_SECRET_KEY="${{ secrets.DO_SPACES_SECRET_KEY }}"
            MEDIA_UPLOAD_URL_TTL="${{ secrets.MEDIA_UPLOAD_URL_TTL || 'PT15M' }}"
            MEDIA_MAX_IMAGE_SIZE_BYTES="${{ secrets.MEDIA_MAX_IMAGE_SIZE_BYTES || '20971520' }}"
            MEDIA_MAX_DOC_SIZE_BYTES="${{ secrets.MEDIA_MAX_DOC_SIZE_BYTES || '20971520' }}"
            MEDIA_DELETE_REMOTE="${{ secrets.MEDIA_DELETE_REMOTE || 'false' }}"
            MEDIA_ARTICLE_PREFIX="${{ secrets.MEDIA_ARTICLE_PREFIX || 'articles' }}"
            MEDIA_LIBRARY_PREFIX="${{ secrets.MEDIA_LIBRARY_PREFIX || 'library' }}"
            FRONTEND_BASE_URL="${{ secrets.FRONTEND_BASE_URL }}"
            BILLING_TOKEN_TO_LLM_RATIO="${{ secrets.BILLING_TOKEN_TO_LLM_RATIO || '1.0' }}"
            BILLING_RESERVATION_TTL_MINUTES="${{ secrets.BILLING_RESERVATION_TTL_MINUTES || '30' }}"
            BILLING_SAFETY_FACTOR="${{ secrets.BILLING_SAFETY_FACTOR || '1.2' }}"
            BILLING_CURRENCY="${{ secrets.BILLING_CURRENCY || 'USD' }}"
            EOF
            sed -i "s/__RELEASE_SHA__/${RELEASE_SHA}/" .env
            chmod 600 .env
            docker compose --env-file .env config --quiet

            wait_for_health() {
              local container="$1"
              local label="$2"

              for attempt in $(seq 1 60); do
                local status
                status=$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container")
                if [ "$status" = "healthy" ]; then
                  echo "${label} is healthy"
                  return 0
                fi
                if [ "$status" = "unhealthy" ] || [ "$status" = "exited" ]; then
                  echo "${label} failed with status ${status}" >&2
                  docker logs --tail=200 "$container" || true
                  return 1
                fi
                sleep 5
              done

              echo "${label} did not become healthy" >&2
              docker logs --tail=200 "$container" || true
              return 1
            }

            mysql_container=$(docker compose --env-file .env ps -q mysql || true)
            if [ -z "$mysql_container" ]; then
              docker compose --env-file .env up -d mysql
              mysql_container=$(docker compose --env-file .env ps -q mysql)
              wait_for_health "$mysql_container" "MySQL"
            fi

            previous_container=$(docker compose --env-file .env ps -q quizmaker-backend || true)
            rollback_image=""
            if [ -n "$previous_container" ]; then
              rollback_image="quizmaker-backend:rollback-${RELEASE_SHA:0:12}"
              docker tag "$(docker inspect --format '{{.Image}}' "$previous_container")" "$rollback_image"
            fi

            docker compose --env-file .env build quizmaker-backend

            candidate="quizmaker-backend-candidate-${RELEASE_SHA:0:12}"
            docker rm -f "$candidate" >/dev/null 2>&1 || true
            docker compose --env-file .env run -d --name "$candidate" --no-deps quizmaker-backend

            if ! wait_for_health "$candidate" "Candidate backend"; then
              docker rm -f "$candidate" || true
              exit 1
            fi
            docker rm -f "$candidate"

            rollback_needed=false
            rollback() {
              trap - ERR
              docker compose --env-file .env stop quizmaker-backend || true
              docker compose --env-file .env rm -f quizmaker-backend || true
              if [ -n "$rollback_image" ]; then
                BACKEND_IMAGE="$rollback_image" docker compose --env-file .env up -d --no-deps quizmaker-backend
                restored_container=$(docker compose --env-file .env ps -q quizmaker-backend)
                wait_for_health "$restored_container" "Restored backend" || true
              fi
            }

            on_handoff_error() {
              if [ "$rollback_needed" = true ]; then
                rollback
              fi
            }
            trap on_handoff_error ERR

            if [ -n "$previous_container" ]; then
              rollback_needed=true
              docker compose --env-file .env stop quizmaker-backend
              docker compose --env-file .env rm -f quizmaker-backend
            fi

            docker compose --env-file .env up -d --no-deps quizmaker-backend
            active_container=$(docker compose --env-file .env ps -q quizmaker-backend)
            if ! wait_for_health "$active_container" "Replacement backend"; then
              rollback
              exit 1
            fi

            if ! curl --fail --silent --show-error --max-time 15 https://quizzence.com/actuator/health >/dev/null; then
              echo "External backend health check failed; restoring the previous release" >&2
              rollback
              exit 1
            fi

            rollback_needed=false
            trap - ERR
            docker image prune -f
            echo "Deployed CI-verified release ${RELEASE_SHA}"
